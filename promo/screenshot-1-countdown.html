<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            height: 100vh;
            background: #f5f0e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Playfair Display', Georgia, serif;
            color: #1a1a1a;
            overflow: hidden;
        }
        .status-bar {
            width: 100%;
            height: 120px;
        }
        .info-btn {
            align-self: flex-end;
            margin-right: 60px;
            margin-top: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            font-size: 32px;
            color: rgba(26,26,26,0.4);
        }
        .spacer { flex: 1; }
        .icon {
            width: 340px;
            height: 340px;
            border-radius: 72px;
            overflow: hidden;
            margin-bottom: 72px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.08);
            background: linear-gradient(180deg, #f5f0e8 0%, #ede4d3 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon svg {
            width: 280px;
            height: 200px;
        }
        .icon .rays line { stroke: #d4b85a; stroke-width: 2.5; stroke-linecap: round; }
        .icon .sun-half { fill: url(#sg); }
        .icon .horizon { stroke: #c4a44a; stroke-width: 1.5; opacity: 0.5; }
        .icon .pause-bar { fill: white; opacity: 0.85; }
        .countdown {
            font-family: 'Inter', sans-serif;
            font-size: 108px;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }
        .countdown-label {
            font-size: 46px;
            font-weight: 400;
            color: rgba(26,26,26,0.5);
            margin-bottom: 10px;
        }
        .countdown-date {
            font-size: 34px;
            font-weight: 300;
            color: rgba(26,26,26,0.35);
        }
        .spacer2 { flex: 1; }
        .join-text {
            font-size: 34px;
            color: rgba(26,26,26,0.45);
            text-align: center;
            padding: 0 80px;
            margin-bottom: 36px;
        }
        .buttons {
            display: flex;
            gap: 24px;
            margin-bottom: 140px;
        }
        .btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 36px;
            border-radius: 36px;
            font-family: 'Inter', sans-serif;
            font-size: 30px;
            font-weight: 500;
        }
        .btn-share {
            background: rgba(26,26,26,0.08);
            color: rgba(26,26,26,0.6);
        }
    </style>
</head>
<body>
    <div class="status-bar"></div>
    <div class="info-btn">&oplus;</div>
    <div class="spacer"></div>

    <div class="icon">
        <svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#e0be4a" />
                    <stop offset="100%" stop-color="#c9a235" />
                </linearGradient>
                <clipPath id="hc"><rect x="70" y="30" width="160" height="90" /></clipPath>
            </defs>
            <g class="rays">
                <line x1="150" y1="30" x2="150" y2="55" />
                <line x1="115" y1="38" x2="122" y2="60" />
                <line x1="185" y1="38" x2="178" y2="60" />
                <line x1="85" y1="60" x2="98" y2="75" />
                <line x1="215" y1="60" x2="202" y2="75" />
                <line x1="65" y1="90" x2="82" y2="95" />
                <line x1="235" y1="90" x2="218" y2="95" />
            </g>
            <circle cx="150" cy="120" r="55" class="sun-half" clip-path="url(#hc)" />
            <rect class="pause-bar" x="139" y="80" width="8" height="30" rx="3" />
            <rect class="pause-bar" x="153" y="80" width="8" height="30" rx="3" />
            <line class="horizon" x1="30" y1="120" x2="270" y2="120" />
        </svg>
    </div>

    <div class="countdown">115d 08h 23m 41s</div>
    <div class="countdown-label">Digital Sabbath</div>
    <div class="countdown-date">June 21, 2026 &mdash; Summer Solstice</div>

    <div class="spacer2"></div>

    <div class="join-text">Join <strong>1,247</strong> people worldwide on a day of Digital Sabbath</div>

    <div class="buttons">
        <div class="btn btn-share">&#8683; Share</div>
    </div>
</body>
</html>
