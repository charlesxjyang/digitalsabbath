<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(180deg, #f5f0e8 0%, #ede4d3 50%, #f5f0e8 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', Georgia, serif;
            color: #1a1a1a;
            overflow: hidden;
            position: relative;
        }

        .logo {
            width: 450px;
            height: 330px;
            margin-bottom: 80px;
            position: relative;
        }

        .logo svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .rays line {
            stroke: #d4b85a;
            stroke-width: 2.5;
            stroke-linecap: round;
        }

        .sun-half {
            fill: url(#sunGradient);
        }

        .horizon {
            stroke: #c4a44a;
            stroke-width: 1.5;
            opacity: 0.5;
        }

        .pause-bar {
            fill: white;
            opacity: 0.85;
            rx: 3;
        }

        h1 {
            font-size: 88px;
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 40px;
            text-align: center;
        }

        .date {
            font-size: 52px;
            font-weight: 400;
            color: #c4a44a;
            margin-bottom: 48px;
            text-align: center;
        }

        .subtitle {
            font-size: 42px;
            font-weight: 400;
            color: rgba(26, 26, 26, 0.5);
            max-width: 800px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 100px;
        }

        .cta {
            font-family: 'Inter', sans-serif;
            font-size: 36px;
            font-weight: 500;
            background: #1a1a1a;
            color: white;
            padding: 28px 64px;
            border-radius: 100px;
            margin-bottom: 32px;
        }

        .url {
            font-family: 'Inter', sans-serif;
            font-size: 30px;
            color: rgba(26, 26, 26, 0.35);
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    <div class="logo">
        <svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="sunGradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#e0be4a" />
                    <stop offset="100%" stop-color="#c9a235" />
                </linearGradient>
                <clipPath id="halfClip">
                    <rect x="70" y="30" width="160" height="90" />
                </clipPath>
            </defs>

            <!-- Rays (only top half, fanning from center) -->
            <g class="rays">
                <line x1="150" y1="30" x2="150" y2="55" />
                <line x1="115" y1="38" x2="122" y2="60" />
                <line x1="185" y1="38" x2="178" y2="60" />
                <line x1="85" y1="60" x2="98" y2="75" />
                <line x1="215" y1="60" x2="202" y2="75" />
                <line x1="65" y1="90" x2="82" y2="95" />
                <line x1="235" y1="90" x2="218" y2="95" />
            </g>

            <!-- Half sun -->
            <circle cx="150" cy="120" r="55" class="sun-half" clip-path="url(#halfClip)" />

            <!-- Pause symbol -->
            <rect class="pause-bar" x="139" y="80" width="8" height="30" rx="3" />
            <rect class="pause-bar" x="153" y="80" width="8" height="30" rx="3" />

            <!-- Horizon line -->
            <line class="horizon" x1="30" y1="120" x2="270" y2="120" />
        </svg>
    </div>

    <h1>Digital Sabbath</h1>
    <div class="date">June 21, 2026</div>
    <div class="subtitle">One day a year,<br>we can all stop scrolling.</div>
    <div class="url">digitalsabbath.live</div>
</body>
</html>
