<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            height: 100vh;
            background: #f5f0e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Playfair Display', Georgia, serif;
            color: #1a1a1a;
            overflow: hidden;
        }
        .status-bar { width: 100%; height: 120px; }
        .spacer { flex: 1; }
        h1 {
            font-size: 108px;
            font-weight: 100;
            letter-spacing: -0.02em;
            margin-bottom: 72px;
        }
        .subtitle {
            font-size: 44px;
            font-weight: 400;
            color: rgba(26,26,26,0.65);
            text-align: center;
            line-height: 1.6;
            padding: 0 90px;
            margin-bottom: 36px;
        }
        .tagline {
            font-size: 36px;
            font-weight: 400;
            color: rgba(26,26,26,0.4);
            text-align: center;
            line-height: 1.8;
            padding: 0 90px;
        }
        .btn {
            font-size: 42px;
            font-weight: 500;
            color: white;
            background: #1a1a1a;
            padding: 0 80px;
            height: 128px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 64px;
            width: calc(100% - 160px);
            margin-bottom: 140px;
        }
    </style>
</head>
<body>
    <div class="status-bar"></div>
    <div class="spacer"></div>

    <h1>Digital Sabbath</h1>
    <div class="subtitle">On June 21, 2026, we all put down our phones together.</div>
    <div class="tagline">No doomscrolling.<br>One Day of Collective Rest.</div>

    <div class="spacer"></div>

    <div class="btn">I'm in</div>
</body>
</html>
